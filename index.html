<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BLDC Motor Simulator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ════════════════════════════════════════════════
     Motor Visualization Panel
═══════════════════════════════════════════════════ -->
<div id="motorPanel">
  <div class="app-title">BLDC Motor Simulator</div>

  <svg id="motorSvg" viewBox="-270 -270 540 540" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <!-- Glow for stator field vector -->
      <filter id="fGlow" x="-80%" y="-80%" width="260%" height="260%">
        <feGaussianBlur stdDeviation="5" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <!-- Soft glow for active coils -->
      <filter id="fCoil" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <!-- North pole radial gradient -->
      <radialGradient id="gN" cx="50%" cy="50%" r="70%">
        <stop offset="0%" stop-color="#ff7755" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#991122" stop-opacity="0.9"/>
      </radialGradient>
      <!-- South pole radial gradient -->
      <radialGradient id="gS" cx="50%" cy="50%" r="70%">
        <stop offset="0%" stop-color="#5599ff" stop-opacity="0.95"/>
        <stop offset="100%" stop-color="#112299" stop-opacity="0.9"/>
      </radialGradient>
      <!-- Hub gradient -->
      <radialGradient id="gHub" cx="38%" cy="32%" r="65%">
        <stop offset="0%" stop-color="#606070"/>
        <stop offset="100%" stop-color="#181820"/>
      </radialGradient>
    </defs>

    <!-- Outer housing ring -->
    <circle r="258" fill="#070710" stroke="#1a1a2a" stroke-width="3"/>

    <!-- Stator body -->
    <circle r="218" fill="#0c0c18" stroke="#181826" stroke-width="2"/>

    <!-- Stator coil arcs (JS-managed) -->
    <g id="statorCoils" filter="url(#fCoil)"></g>

    <!-- Stator bore inner ring -->
    <circle r="148" fill="#080810" stroke="#161624" stroke-width="1.5"/>

    <!-- ── Rotor (rotates via JS transform) ── -->
    <g id="rotorGroup">
      <circle r="141" fill="#0f0f1e" stroke="#1e1e30" stroke-width="1.5"/>
      <!-- Pole wedge paths (JS-managed) -->
      <g id="rotorPoles"></g>
      <!-- Outer pole ring border -->
      <circle r="141" fill="none" stroke="#252535" stroke-width="1"/>
      <!-- Inner shaft boss -->
      <circle r="27"  fill="#141422" stroke="#252535" stroke-width="1"/>
      <!-- Reference tick (physical rotor position marker) -->
      <line x1="0" y1="-82" x2="0" y2="-135"
            stroke="#ffffff" stroke-width="1.5"
            stroke-linecap="round" opacity="0.35"/>
    </g>

    <!-- ── Stator magnetic field vector ── -->
    <g id="fieldVecGroup" filter="url(#fGlow)">
      <line id="fieldVecLine" x1="0" y1="0" x2="0" y2="-95"
            stroke="#4a9eff" stroke-width="2.5"
            stroke-linecap="round" opacity="0.92"/>
      <polygon id="fieldVecHead" points="0,-112 -7,-98 7,-98"
               fill="#4a9eff" opacity="0.92"/>
    </g>

    <!-- ── Centre hub ── -->
    <circle r="23" fill="url(#gHub)" stroke="#3a3a50" stroke-width="1.5"/>
    <circle r="6"  fill="#0e0e18" stroke="#303040" stroke-width="1"/>

    <!-- Phase terminal labels -->
    <text x="0"    y="-238" text-anchor="middle" dominant-baseline="middle"
          fill="#ff4455" font-size="11" font-family="monospace" font-weight="bold" opacity="0.75">U</text>
    <text x="206"  y="119"  text-anchor="middle" dominant-baseline="middle"
          fill="#3dff88" font-size="11" font-family="monospace" font-weight="bold" opacity="0.75">V</text>
    <text x="-206" y="119"  text-anchor="middle" dominant-baseline="middle"
          fill="#4488ff" font-size="11" font-family="monospace" font-weight="bold" opacity="0.75">W</text>
  </svg>
</div>

<!-- ════════════════════════════════════════════════
     Control Panel
═══════════════════════════════════════════════════ -->
<div id="ctrlPanel">

  <div class="sec">Commutation Mode</div>
  <div class="btn-row" id="commBtns">
    <button class="btn"    data-cm="manual"     >Manual</button>
    <button class="btn"    data-cm="openLoop"   >Open Loop</button>
    <button class="btn on" data-cm="closedLoop" >Closed Loop</button>
    <button class="btn"    data-cm="sensorless" >Sensorless</button>
  </div>

  <div class="sec">Signal Mode</div>
  <div class="btn-row" id="signalBtns">
    <button class="btn on" data-sm="sinusoidal" >FOC / Sine</button>
    <button class="btn"    data-sm="trapezoidal">6-Step / Trap</button>
  </div>

  <div class="sec">Controls</div>

  <div class="ctrl">
    <div class="ctrl-lbl">
      <span class="ctrl-name">Throttle</span>
      <span class="ctrl-val" id="dThrottle">30%</span>
    </div>
    <input type="range" id="sThrottle" min="0" max="100" value="30" step="1">
  </div>

  <div class="ctrl" id="ctrlManual">
    <div class="ctrl-lbl">
      <span class="ctrl-name">Manual Angle</span>
      <span class="ctrl-val" id="dManual">0°</span>
    </div>
    <input type="range" id="sManual" min="0" max="359" value="0" step="1" class="muted">
  </div>

  <div class="ctrl">
    <div class="ctrl-lbl">
      <span class="ctrl-name">Advance Angle (Field Weakening)</span>
      <span class="ctrl-val" id="dAdvance">15°</span>
    </div>
    <input type="range" id="sAdvance" min="-30" max="60" value="15" step="1">
  </div>

  <div class="sec">Pole Pairs</div>
  <div class="btn-row" id="ppBtns">
    <button class="btn pole-btn"      data-pp="1">1 pp</button>
    <button class="btn pole-btn on-G" data-pp="2">2 pp</button>
    <button class="btn pole-btn"      data-pp="3">3 pp</button>
    <button class="btn pole-btn"      data-pp="4">4 pp</button>
  </div>

  <div class="sec">Telemetry</div>
  <div class="ro-grid">
    <div class="ro-box">
      <div class="ro-lbl">Speed</div>
      <div><span class="ro-val" id="dSpeed">0</span><span class="ro-unit">RPM</span></div>
    </div>
    <div class="ro-box">
      <div class="ro-lbl">Torque</div>
      <div><span class="ro-val" id="dTorque">0.00</span><span class="ro-unit">pu</span></div>
    </div>
    <div class="ro-box">
      <div class="ro-lbl">Elec. Angle</div>
      <div><span class="ro-val" id="dElec">0</span><span class="ro-unit">°</span></div>
    </div>
    <div class="ro-box">
      <div class="ro-lbl">Rotor Angle</div>
      <div><span class="ro-val" id="dRotor">0</span><span class="ro-unit">°</span></div>
    </div>
  </div>

  <div class="sec">Phase Voltages</div>
  <div class="phase-row">
    <div class="phase-col">
      <div class="phase-track">
        <div class="phase-fill" id="phU" style="background:#ff4455"></div>
      </div>
      <span class="phase-lbl" style="color:#ff4455">U</span>
    </div>
    <div class="phase-col">
      <div class="phase-track">
        <div class="phase-fill" id="phV" style="background:#3dff88"></div>
      </div>
      <span class="phase-lbl" style="color:#3dff88">V</span>
    </div>
    <div class="phase-col">
      <div class="phase-track">
        <div class="phase-fill" id="phW" style="background:#4488ff"></div>
      </div>
      <span class="phase-lbl" style="color:#4488ff">W</span>
    </div>
  </div>

  <button id="runBtn">⏸ PAUSE</button>

</div>

<!-- ════════════════════════════════════════════════
     Simulation Engine
═══════════════════════════════════════════════════ -->
<script src="motor.js"></script>
</body>
</html>
